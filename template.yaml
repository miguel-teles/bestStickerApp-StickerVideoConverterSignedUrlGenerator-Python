AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  StickerVideoConverterSignedUrlGenerator

  Sample SAM Template for StickerVideoConverterSignedUrlGenerator

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 10

    Tracing: Active
  Api:
    TracingEnabled: true
Resources:
  StickerVideoConverterSignedUrlGenerator:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      FunctionName: StickerVideoConverterSignedUrlGenerator
      CodeUri: src/
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
      - x86_64
      AutoPublishAlias: dev
      Environment:
        Variables:
          INPUT_BUCKET_NAME: beststickerapp-videoconvertion-in
          OUTPUT_BUCKET_NAME: beststickerapp-videoconvertion-out
          EXPIRATION_DURATION_SIGNED_URL_UPLOAD: 30
          EXPIRATION_DURATION_SIGNED_URL_DOWNLOAD: 60
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                - arn:aws:s3:::beststickerapp-videoconvertion-in/*
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - arn:aws:s3:::beststickerapp-videoconvertion-out/*
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource:
                - arn:aws:s3:::beststickerapp-videoconvertion-out

Outputs:
  # ServerlessRestApi is an implicit API created out of Events key under Serverless::Function
  # Find out more about other implicit resources you can reference within SAM
  # https://github.com/awslabs/serverless-application-model/blob/master/docs/internals/generated_resources.rst#api
  StickerVideoConverterSignedUrlGeneratorFunction:
    Description: Sticker Video Converter Signed Url Generator Lambda Function ARN
    Value: !GetAtt StickerVideoConverterSignedUrlGenerator.Arn
    Export:
      Name: StickerVideoConverterSignedUrlGeneratorFunction

  StickerVideoConverterSignedUrlGeneratorFunctionIamRole:
    Description: IAM Role for Sticker Video Converter Signed Url Generator Lambda
    Value: !GetAtt StickerVideoConverterSignedUrlGeneratorRole.Arn
